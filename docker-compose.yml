
services:
  ml-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ml-service
    ports:
      - "8000:8000"
    volumes:
      # Монтируем папку с результатами (файлы будут видны на хосте)
      - ./results:/app/results
      # Монтируем папку со стилями (можно добавлять стили без пересборки)
      - ./styles:/app/styles
      # Монтируем папку для временных файлов
      - ./temp_content:/app/temp_content
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    # Поддержка GPU (раскомментируйте если есть NVIDIA)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

networks:
  default:
    name: ml-network